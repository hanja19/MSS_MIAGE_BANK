# Configuration spécifique pour le micro-service Client
server:
  port: 8081  # C'est ici qu'on définit le port, pas dans IntelliJ !

spring:
  # Configuration de la base de données en mémoire (H2) pour le TP
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

  # Configuration JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

# Configuration pour que le service s'enregistre dans Eureka
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:10001/eureka/
  instance:
    prefer-ip-address: true
